<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Loading Animation</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Main Wrapper for Layout */
        .main-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Container that handles the physical space of the logo */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 120px; 
            height: 120px;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Container that handles the visual scaling of the logo */
        .logo-scaler {
            width: 120px;
            height: 120px;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }

        /* The continuous rotating ring */
        .spinner-rotator {
            width: 100%;
            height: 100%;
            position: relative;
            animation: rotateRing 8s linear infinite;
        }

        @keyframes rotateRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Individual petal wrappers to position them in a circle */
        .petal-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(calc(var(--i) * 45deg));
        }

        /* The actual oval shape (petal) */
        .petal {
            position: absolute;
            top: 0;
            left: 50%;
            width: 26px;
            height: 40px;
            /* Gradient matching the Meta AI colors */
            background: linear-gradient(135deg, #4d7cff, #b026ff, #ff1a8c);
            border-radius: 50px;
            transform: translateX(-50%);
            /* The flipping/pulsing animation */
            animation: flipPetal 1.4s infinite ease-in-out;
            animation-delay: calc(var(--i) * 0.15s);
        }

        @keyframes flipPetal {
            0%, 100% { transform: translateX(-50%) scaleX(1); }
            50% { transform: translateX(-50%) scaleX(0.15); }
        }

        /* Meta Text Styles */
        .text-container {
            max-width: 0;
            opacity: 0;
            overflow: hidden;
            color: #ffffff;
            font-size: 55px;
            font-weight: 600;
            letter-spacing: -1px;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
        }

        /* ---- REVEAL STATE (When JS adds the 'reveal' class) ---- */
        
        .main-wrapper.reveal .logo-container {
            width: 45px; /* Collapse layout space */
        }

        .main-wrapper.reveal .logo-scaler {
            transform: scale(0.35); /* Shrink visually */
        }

        .main-wrapper.reveal .text-container {
            max-width: 200px; /* Expand to show text */
            opacity: 1;
            margin-left: 15px; /* Space between logo and text */
        }
    </style>
</head>
<body>

    <div class="main-wrapper" id="animationWrapper">
        <div class="logo-container">
            <div class="logo-scaler">
                <div class="spinner-rotator">
                    <div class="petal-wrapper" style="--i: 0"><div class="petal"></div></div>
                    <div class="petal-wrapper" style="--i: 1"><div class="petal"></div></div>
                    <div class="petal-wrapper" style="--i: 2"><div class="petal"></div></div>
                    <div class="petal-wrapper" style="--i: 3"><div class="petal"></div></div>
                    <div class="petal-wrapper" style="--i: 4"><div class="petal"></div></div>
                    <div class="petal-wrapper" style="--i: 5"><div class="petal"></div></div>
                    <div class="petal-wrapper" style="--i: 6"><div class="petal"></div></div>
                    <div class="petal-wrapper" style="--i: 7"><div class="petal"></div></div>
                </div>
            </div>
        </div>
        <div class="text-container">MetaAI</div>
    </div>

    <script>
        // JavaScript to trigger the transition from Loading -> Text Reveal
        const wrapper = document.getElementById('animationWrapper');

        // Initial reveal after 3 seconds
        setTimeout(() => {
            wrapper.classList.add('reveal');
        }, 3000);

        // Optional: Loop the animation every 7 seconds so you can see it repeatedly 
        // (You can remove this setInterval if you only want it to happen once)
        setInterval(() => {
            wrapper.classList.toggle('reveal');
        }, 7000);
    </script>

</body>
</html>
